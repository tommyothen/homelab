# Authentik forwardAuth middleware
#
# Apply to any router that should require SSO login.
# Services with their own auth (Plex, Seerr, Authentik) should skip this.

http:
  middlewares:
    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
